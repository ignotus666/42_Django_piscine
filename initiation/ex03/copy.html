<!DOCTYPE html>
<html>
    <head>
        <title>Skills</title>

        <link rel="stylesheet" href="style.css">

        <style>
            .w80 {width: 80%; }
            .w60 {width: 60%; }
            .w50 {width: 50%; }
            .w75 {width: 75%; }
            .w65 {width: 65%; }
            .w35 {width: 35%; }
        </style>
        
    </head>

    <body>
        <ul>
            <li>

                <h2>Frontend</h2>

                <p data-value="80" class="w80">HTML5</p>
                <progress class="html5" value="80" max="100"></progress>

                <p data-value="60" class="w60">CSS3</p>
                <progress class="html5" value="60" max="100"></progress>

                <p data-value="50" class="w50">jQuery</p>
                <progress class="html5" value="50" max="100"></progress>

            </li>

            <li>
                
                <h2>Backend</h2>

                <p data-value="75" class="w75">Python</p>
                <progress class="python" value="75" max="100"></progress>
               
                <p data-value="65" class="w65">PHP</p>
                <progress class="python" value="65" max="100"></progress>

                <p data-value="35" class="w35">Node.js</p>
                <progress class="python" value="35" max="100"></progress>

            </li>

        </ul>
    </body>
</html>
